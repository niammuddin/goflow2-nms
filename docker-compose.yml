services:

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    environment:
      # --- KONFIGURASI KRAFT MODE (MANDIRI TANPA ZOOKEEPER) ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      CLUSTER_ID: 'ciWo7IWazngRchmPES6q5A'
      # --------------------------------------------------------
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://127.0.0.1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xmx1G -Xms512M"
      KAFKA_LOG_RETENTION_HOURS: 2
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      TZ: Asia/Jakarta
    volumes:
      - ./data/kafka:/var/lib/kafka/data
    ports:
      - "127.0.0.1:9092:9092"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    restart: unless-stopped
    environment:
      TZ: Asia/Jakarta
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
    ports:
      - "127.0.0.1:8123:8123" # Dikunci hanya untuk localhost
      - "127.0.0.1:9000:9000" # Dikunci hanya untuk localhost
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    depends_on:
      - kafka
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
      - TZ=Asia/Jakarta
    volumes:
      - ./data/grafana:/var/lib/grafana
    ports:
      - "3000:3000" # Ini satu-satunya pintu yang dibiarkan terbuka untuk web UI
    depends_on:
      - clickhouse
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  goflow2:
    image: netsampler/goflow2:latest
    restart: unless-stopped
    network_mode: "host"
    environment:
      TZ: Asia/Jakarta
    command:
      - "-format=json"
      - "-transport=kafka"
      - "-transport.kafka.brokers=127.0.0.1:9092"
      - "-transport.kafka.topic=flows"
    depends_on:
      - kafka
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
