services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      TZ: Asia/Jakarta
    volumes:
      - ./data/zookeeper:/var/lib/zookeeper/data
    # Port 2181 dihapus karena Zookeeper hanya butuh ngobrol internal dengan Kafka
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://127.0.0.1:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # INI PAGAR RAM-NYA: Minimal 512MB, Maksimal 1GB (Sesuaikan jika RAM VM Anda kecil)
      KAFKA_HEAP_OPTS: "-Xmx1G -Xms512M"
      # --- TAMBAHKAN DUA BARIS INI (Auto-Delete) ---
      # KAFKA_LOG_RETENTION_MS: 300000 # Hapus data yang lebih tua dari 5 menit
      KAFKA_LOG_RETENTION_HOURS: 2 # Hapus data yang lebih tua dari 2 jam
      KAFKA_LOG_RETENTION_BYTES: 1073741824 # Atau hapus jika total file sudah mencapai 1 GB
      TZ: Asia/Jakarta
    volumes:
      - ./data/kafka:/var/lib/kafka/data
    depends_on:
      - zookeeper
    ports:
      - "127.0.0.1:9092:9092" # Dikunci hanya untuk localhost (GoFlow2)
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    restart: unless-stopped
    environment:
      TZ: Asia/Jakarta
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
    ports:
      - "127.0.0.1:8123:8123" # Dikunci hanya untuk localhost
      - "127.0.0.1:9000:9000" # Dikunci hanya untuk localhost
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    depends_on:
      - kafka
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
      - TZ=Asia/Jakarta
    volumes:
      - ./data/grafana:/var/lib/grafana
    ports:
      - "3000:3000" # Ini satu-satunya pintu yang dibiarkan terbuka untuk web UI
    depends_on:
      - clickhouse
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  goflow2:
    image: netsampler/goflow2:latest
    restart: unless-stopped
    network_mode: "host"
    environment:
      TZ: Asia/Jakarta
    command:
      - "-format=json"
      - "-transport=kafka"
      - "-transport.kafka.brokers=127.0.0.1:9092"
      - "-transport.kafka.topic=flows"
    depends_on:
      - kafka
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
